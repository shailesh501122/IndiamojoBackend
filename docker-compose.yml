version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: 8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=indiamojo;Username=postgres;Password=postgres
      Jwt__Issuer: IndiamojoBackend
      Jwt__Audience: IndiamojoClients
      Jwt__Secret: CHANGE_ME_TO_A_LONG_RANDOM_SECRET_VALUE
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: indiamojo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
